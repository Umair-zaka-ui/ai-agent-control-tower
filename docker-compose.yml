# ---------------------------------------------------------------------------
# AI Agent Control Tower - full local stack (SPA + API + PostgreSQL).
#
#   docker compose up -d --build          # build & run web + api + db
#   docker compose up -d db               # just the database (for local dev)
#
# Open the app at http://localhost:8080 (the web container serves the SPA and
# reverse-proxies /api to the api service — same origin, no CORS).
#
# The api service runs migrations on start; set SEED_ON_START=true to also load
# demo data on first boot. See docs/deployment.md for the production checklist.
# ---------------------------------------------------------------------------
services:
  db:
    image: postgres:16-alpine
    container_name: act_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_control_tower
    ports:
      - "5432:5432"
    volumes:
      - act_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_control_tower"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: act_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "db".
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/agent_control_tower
      JWT_SECRET_KEY: change-me-in-docker-compose
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      SEED_ON_START: "true"
      NOTIFICATIONS_ENABLED: "false"
      # Behind the web reverse-proxy: trust X-Forwarded-For so rate limiting and
      # risk scoring see the real client IP, not the proxy's (SRS 4.2.2.3.1 §19).
      TRUST_PROXY_HEADERS: "true"
      # Standard §5 envelope + security headers stay on (defaults; explicit here).
      RESPONSE_ENVELOPE_ENABLED: "true"
      SECURITY_HEADERS_ENABLED: "true"
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      args:
        # Empty = same-origin; the SPA calls /api/... and nginx proxies to api.
        VITE_API_BASE_URL: ""
    container_name: act_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  act_pgdata:
